<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>teex</title>
    <script>
      // Apply saved theme before first paint to prevent flash.
      (function () {
        var t = localStorage.getItem("teex-theme");
        if (t === "light" || t === "dark") {
          document.documentElement.setAttribute("data-theme", t);
        }
      })();
    </script>
    <style>
      /* Critical: set background before stylesheet loads to prevent white flash. */
      html,
      body {
        background: #282c34;
        color-scheme: dark;
      }
      @media (prefers-color-scheme: light) {
        html:not([data-theme="dark"]),
        html:not([data-theme="dark"]) body {
          background: #ffffff;
          color-scheme: light;
        }
      }
      html[data-theme="light"],
      html[data-theme="light"] body {
        background: #ffffff;
        color-scheme: light;
      }
      html[data-theme="dark"],
      html[data-theme="dark"] body {
        background: #282c34;
        color-scheme: dark;
      }
    </style>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <main id="workspace" class="workspace workspace-empty">
        <aside id="sidebar" class="sidebar hidden" aria-label="Folder files">
          <div class="sidebar-header">
            <h2 id="project-root-label" class="sidebar-title">Folder</h2>
            <div class="sidebar-toolbar">
              <button id="unified-diff-btn" class="sidebar-toolbar-btn" type="button"
                      title="Review all changes (⇧⌘D)" aria-label="Review all changes" aria-pressed="false">
                <svg aria-hidden="true" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 3v18"/>
                  <path d="M5 7l-2 2 2 2"/>
                  <path d="M19 13l2 2-2 2"/>
                </svg>
              </button>
              <button id="modified-toggle-btn" class="sidebar-toolbar-btn" type="button"
                      title="Show modified files only" aria-label="Show modified files only" aria-pressed="false">
                <svg aria-hidden="true" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 6h16"/>
                  <path d="M7 12h10"/>
                  <path d="M10 18h4"/>
                </svg>
              </button>
              <button id="collapse-toggle-btn" class="sidebar-toolbar-btn" type="button"
                      title="Collapse all folders (⇧⌘E)" aria-label="Collapse all folders (⇧⌘E)" style="visibility: hidden">
                <svg class="collapse-icon" aria-hidden="true" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 7.59L7.05 2.64 5.64 4.05 12 10.41l6.36-6.36-1.41-1.41L12 7.59zM12 16.41l4.95 4.95 1.41-1.41L12 13.59l-6.36 6.36 1.41 1.41L12 16.41z"/></svg>
                <svg class="expand-icon" aria-hidden="true" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 19.24l-4.95-4.95-1.41 1.42L12 22.07l6.36-6.36-1.41-1.42L12 19.24zM12 4.76l4.95 4.95 1.41-1.42L12 1.93 5.64 8.29l1.41 1.42L12 4.76z"/></svg>
              </button>
            </div>
          </div>
          <div id="project-list" class="project-list"></div>
        </aside>
        <div id="sidebar-resizer" class="sidebar-resizer hidden" aria-hidden="true"></div>

        <section id="main-pane" class="main-pane">
          <div class="tab-bar-row">
            <button id="nav-back" class="nav-btn" type="button" title="Back (⌘[)" disabled aria-label="Navigate back">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M10.3 2.3a1 1 0 0 1 0 1.4L6.42 8l3.88 4.3a1 1 0 1 1-1.5 1.4l-4.5-5a1 1 0 0 1 0-1.4l4.5-5a1 1 0 0 1 1.5 0z"/></svg>
            </button>
            <button id="nav-forward" class="nav-btn" type="button" title="Forward (⌘])" disabled aria-label="Navigate forward">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M5.7 2.3a1 1 0 0 1 1.5 0l4.5 5a1 1 0 0 1 0 1.4l-4.5 5a1 1 0 1 1-1.5-1.4L9.58 8 5.7 3.7a1 1 0 0 1 0-1.4z"/></svg>
            </button>
            <div id="tab-bar" class="tab-bar"></div>
          </div>
          <div id="editor-state" class="editor-state">
            <div id="find-bar" class="find-bar hidden">
              <div class="find-input-wrap">
                <input id="find-input" class="find-input" type="text" placeholder="Find..." autocomplete="off" spellcheck="false">
                <span id="find-count" class="find-count"></span>
              </div>
              <button id="find-prev" class="find-nav-btn" type="button" title="Previous (Shift+Enter)" aria-label="Previous match">&#x25B2;</button>
              <button id="find-next" class="find-nav-btn" type="button" title="Next (Enter)" aria-label="Next match">&#x25BC;</button>
              <button id="find-close" class="find-close-btn" type="button" title="Close (Escape)" aria-label="Close find bar">&times;</button>
            </div>
            <div id="editor-backdrop" class="editor-backdrop hidden" aria-hidden="true"></div>
            <textarea id="editor" class="editor" spellcheck="false"></textarea>
            <div id="code-editor" class="code-editor hidden"></div>
            <article id="preview" class="preview hidden"></article>
            <div id="unified-diff" class="unified-diff hidden"></div>
          </div>
          <div id="status-bar" class="status-bar hidden">
            <span id="status-bar-lines"></span>
          </div>
        </section>
      </main>
      <div id="drop-overlay" class="drop-overlay hidden" aria-hidden="true">
        <div class="drop-overlay-card">
          <h3>Drop files to open</h3>
          <p>Drop a folder to open it in the sidebar.</p>
        </div>
      </div>
    </div>
  </body>
</html>
